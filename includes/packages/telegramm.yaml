## коды эмоджи для телеграмм - https://unicode.org/Public/emoji/13.1/emoji-test.txt
telegramm:

  sensor:

    - platform: template
      sensors:

        unavailable_now_light:
          friendly_name: "Всего недоступных светильников - "
          value_template: "{{states.light | selectattr ('state', 'equalto', 'unavailable') | list | length}}"
          icon_template: mdi:counter
          
        unavailable_now_switch:
          friendly_name: "Всего недоступных реле - "
          value_template: "{{states.switch | selectattr ('state', 'equalto', 'unavailable') | list | length}}"
          icon_template: mdi:counter 
          
        unavailable_now_sensor:
          friendly_name: "Всего недоступных сенсоров - "
          value_template: "{{states.sensor | selectattr ('state', 'equalto', 'unavailable') | list | length}}"
          icon_template: mdi:counter
          
        unavailable_now_binary_sensor:
          friendly_name: "Всего недоступных бинарных сенсоров - "
          value_template: "{{states.binary_sensor | selectattr ('state', 'equalto', 'unavailable') | list | length}}"
          icon_template: mdi:counter
          
  automation:
  
    - alias: 'Telegram bot main menu'
      trigger:
        - platform: event
          event_type: telegram_callback
          event_data:
            command: "/start"
        - platform: event
          event_type: telegram_command
          event_data:
            command: "/start"
      action:
        - service: telegram_bot.send_message
          data_template:
            target: "{{ trigger.event.data.user_id }}"
            message: 'Добро пожаловать в главное меню. Выберите действие:'
            inline_keyboard:
              - "Отчет о системе:/report, Прогноз погоды:/forecast"
              - "Погода в доме:/home_climate_report"
  
    - id: Отчет при запуске системы
      alias: start_message
      initial_state: true
      trigger:
        - platform: homeassistant
          event: start
      action:
        - service: notify.tlg_user1_id
          data:
            title: "#system"
            message: | 
              {{"\U0001F4AC"}} ihome 
              {{"\U0001F567"}} Зафиксирован запуск в {{ states('sensor.time_date') }} 
              {{"\U0001F4C3"}} Отчет о состоянии будет через 1 минуту
        # Задержка и отправка полного отчета через минуту
        - delay: 00:01:10
        - service: notify.tlg_user1_id
          data:
            title: "#system"
            message:  | 
              {{"\U0001F4CB"}} Состояние системы
              {{"\U0001F567"}} Отчет за {{ states('sensor.time_date') }}
              {{"\U0001F50C"}} Свичей недоступно - {{ states('sensor.unavailable_now_switch') }}
              {{"\U0001F321"}} Сенсоров недоступно - {{ states('sensor.unavailable_now_sensor') }}
              {{"\U0001F51F"}} Бинарных сенсоров недоступно - {{ states('sensor.unavailable_now_binary_sensor') }}
              {{"\U0001F4A1"}} Светильников недоступно - {{ states('sensor.unavailable_now_light') }}
        # Задержка 2 с
        - delay: 00:00:02
        - service: notify.tlg_user1_id
          data:
            # title: "#system"
            message: 'Добро пожаловать в главное меню. Выберите действие:'
            data:
              inline_keyboard:
                - "Отчет о системе:/report, Прогноз погоды:/forecast"
                - "Погода в доме:/home_climate_report"


    # Отчет о системе по запросу
    - id: Отчет о системе по запросу
      alias: send_report
      initial_state: true
      trigger:
        - platform: event # по запросу из telegramm
          event_type: telegram_callback
          event_data:
            command: '/report'
        - platform: event # по запросу из telegramm
          event_type: telegram_command
          event_data:
            command: '/report'
        - platform: numeric_state # при отвале датчиков
          entity_id: sensor.unavailable_now_sensor
          above: 0
      action:
        - service: telegram_bot.send_message
          data_template:
            target: "{{ trigger.event.data.user_id }}"
            title: "#system"
            message:  | 
              {{"\U0001F4CB"}} Состояние системы
              {{"\U0001F567"}} Отчет за {{ states('sensor.time_date') }}
              {{"\U0001F50C"}} Свичей недоступно - {{ states('sensor.unavailable_now_switch') }}
              {{"\U0001F321"}} Сенсоров недоступно - {{ states('sensor.unavailable_now_sensor') }}
              {{"\U0001F51F"}} Бинарных сенсоров недоступно - {{ states('sensor.unavailable_now_binary_sensor') }}
              {{"\U0001F4A1"}} Светильников недоступно - {{ states('sensor.unavailable_now_light') }}
            inline_keyboard:
              - "Главное меню:/start"


    # Погода в доме
    - id: Выключение света в квартире
      alias: home_climate_report
      initial_state: true
      trigger:
        - platform: event # по запросу из telegramm
          event_type: telegram_callback
          event_data:
            command: '/home_climate_report'
        - platform: event # по запросу из telegramm
          event_type: telegram_command
          event_data:
            command: '/home_climate_report'
      action:
        - service: telegram_bot.send_message
          data_template:
            target: "{{ trigger.event.data.user_id }}"
            message:  | 
              {{"\U000023F1"}} Отчет за {{ states('sensor.time_date') }}
              {{"\U0001F6CB"}} Кухня-гостиная.
              {{"\U0001F321"}} Температура: {{ state_attr('climate.kitchen_living_room_thermostat', 'current_temperature') }} C
              {{"\U0001F3AF"}} Уставка: {{ state_attr('climate.kitchen_living_room_thermostat', 'current_heating_setpoint') }} C
              {{"\U0001F4A1"}} Конвектор: {{ states('switch.kitchen_living_room_heater') }}
              
              {{"\U0001F6BD"}} Туалет.
              {{"\U0001F321"}} Температура: {{ states('sensor.toilet_climate_temperature') }} C
              {{"\U0001F4A1"}} Конвектор: {{ states('switch.toilet_heater') }}
              
              {{"\U0001F6CF"}} Спальня на первом этаже.
              {{"\U0001F321"}} Температура: {{ state_attr('climate.1st_floor_bedroom_thermostat', 'current_temperature') }} C
              {{"\U0001F3AF"}} Уставка: {{ state_attr('climate.1st_floor_bedroom_thermostat', 'current_heating_setpoint') }} C
              {{"\U0001F4A1"}} Конвектор: {{ states('switch.1st_floor_bedroom_heater_l2') }}
              {{"\U0001F525"}} Теплые полы: {{ state_attr('climate.1st_floor_bedroom_thermostat', 'heat') }}
            inline_keyboard:
              - "Главное меню:/start"
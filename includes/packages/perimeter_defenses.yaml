perimeter_defenses:

  automation:

    - alias: "motion_notification"
      id: motion_notification
      trigger:
        - platform: state
          entity_id: binary_sensor.porch_motion_protect_occupancy
          to: "on"
      condition:
        alias: "alarm not disarmed"
        not:
          - condition: state
            entity_id: alarm_control_panel.home_alarm
            state: disarmed
      action:
        # # Сохранение фото
        # - service: camera.snapshot
        #   target:
        #     entity_id: camera.courtyard
        #   data:
        #     filename: '/config/tmp/courtyard_{{ now().strftime("%Y%m%d-%H%M%S") }}.jpg'
        # # Отправка сообщения
        # - service: notify.tlg_user1_id
        #   data:
        #     title: "#security"
        #     message: "*Движение около крыльца*"
        #     # data:
        #     #   photo:
        #     #     - file: /share/motioneye/courtyard/2022-05-22/20-51-55.jpg
        #     #       caption: Picture Title xy
        #     #     - url: http://ihome.artemevk.keenetic.pro/api/hassio_ingress/4Ec7lFKuhRxxTNl5sahkbTCTzhceNP2AtrF-vQ1MZaU/picture/2/current/
        #     #       caption: "Picture Title xy"
        - service: notify.mobile_app_artemevk
          data:
            title: "Охрана"
            message: "Движение около крыльца"
            data:
              url: "/lovelace/cameras"
              push:
                sound:
                  name: "default"
                  critical: 1
                  volume: 0.2
              actions:
                - action: "ALARM" # The key you are sending for the event
                  title: "Sound Alarm" # The button title
                  destructive: true
                  icon: "sfsymbols:bell"
                - action: "SILENCE"
                  title: "Silence Alarm"
                  icon: "sfsymbols:bell.slash"

    - id: Напоминание о необходимости снять дом с охраны
      alias: reminder_to_disarm_the_house
      initial_state: true
      trigger:
        platform: state
        entity_id: device_tracker.artemevk
        to: 'home'
      condition:
        not:
          - condition: state
            entity_id: alarm_control_panel.home_alarm
            state: "disarmed"
      action:
        - service: notify.mobile_app_artemevk
          data:
            title: "Охрана"
            message: "Не забудь снять дом с охраны"
            data:
              url: "/lovelace/secure"
              push:
                sound:
                  name: "default"
                  critical: 1
                  volume: 0.2
              actions:
                - action: "disarmed" # The key you are sending for the event
                  title: "Снять с охраны"
                  icon: "sfsymbols:lock.open"

    - id: Напоминание о необходимости снять дом с охраны АПН
      initial_state: true
      trigger:
        platform: state
        entity_id: device_tracker.artemevp
        to: 'home'
      condition:
        not:
          - condition: state
            entity_id: alarm_control_panel.home_alarm
            state: "disarmed"
      action:
        - service: notify.mobile_app_artemevp
          data:
            title: "Охрана"
            message: "Не забудь снять дом с охраны"
            data:
              url: "/lovelace/secure"
              push:
                sound:
                  name: "default"
                  critical: 1
                  volume: 0.2
              actions:
                - action: "disarmed" # The key you are sending for the event
                  title: "Снять с охраны"
                  icon: "sfsymbols:lock.open"

    - alias: "disarmed"
      trigger:
        - platform: event
          event_type: mobile_app_notification_action
          event_data:
            action: "disarmed"
      action:
        - service: alarm_control_panel.alarm_disarm
          target:
            entity_id: alarm_control_panel.home_alarm

    - alias: 'Trigger alarm while armed away'
      trigger:
        - platform: state
          entity_id: binary_sensor.entrance_door_contact
          to: "on"
        - platform: state
          entity_id: binary_sensor.open_kitchen_motion_sensor_occupancy
          to: "on"
      condition:
        - condition: state
          entity_id: alarm_control_panel.home_alarm
          state: armed_away
      action:
        service: alarm_control_panel.alarm_trigger
        target:
          entity_id: alarm_control_panel.home_alarm

    - alias: 'Trigger alarm while armed home'
      trigger:
        - platform: state
          entity_id: binary_sensor.entrance_door_contact
          to: "on"
      condition:
        - condition: state
          entity_id: alarm_control_panel.home_alarm
          state: armed_home
      action:
        service: alarm_control_panel.alarm_trigger
        target:
          entity_id: alarm_control_panel.home_alarm

    - alias: 'Send notification when alarm triggered'
      trigger:
        - platform: state
          entity_id: alarm_control_panel.home_alarm
          to: "triggered"
      action:
        - service: notify.mobile_app_artemevk
          data:
            title: "Охрана"
            message: "Сработала сигнализация!"
            data:
              url: "/lovelace/secure"
              push:
                sound:
                  name: "alarm.caf"
                  critical: 1
                  volume: 1.0
              actions:
                - action: "ALARM" # The key you are sending for the event
                  title: "Sound Alarm" # The button title
                  destructive: true
                  icon: "sfsymbols:bell"
                - action: "SILENCE"
                  title: "Silence Alarm"
                  icon: "sfsymbols:bell.slash"
                - action: "disarmed"
                  title: "Снять с охраны"
                  icon: "sfsymbols:lock.open"


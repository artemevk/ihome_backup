scene_light:

    scene:

      - name: off_light
        entities:
          light.corridor_lamp_1: off
          light.corridor_lamp_2: off

      - name: min
        entities:
          light.corridor_lamp_1:
            state: "on"
            brightness_pct: 1
            kelvin: 4000
          light.corridor_lamp_2:
            state: "on"
            brightness_pct: 1
            kelvin: 4000

      - name: half
        entities:
          light.corridor_lamp_1:
            state: "on"
            brightness_pct: 50
            kelvin: 4000
          light.corridor_lamp_2:
            state: "on"
            brightness_pct: 50
            kelvin: 4000

      - name: full
        entities:
          light.corridor_lamp_1:
            state: "on"
            brightness_pct: 100
            kelvin: 4000
          light.corridor_lamp_2:
            state: "on"
            brightness_pct: 100
            kelvin: 4000

      - name: warm
        entities:
          light.corridor_lamp_1:
            state: "on"
            kelvin: 2700
          light.corridor_lamp_2:
            state: "on"
            kelvin: 2700

      - name: cold
        entities:
          light.corridor_lamp_1:
            state: "on"
            kelvin: 6300
          light.corridor_lamp_2:
            state: "on"
            kelvin: 6300


    input_select:

      scenes:
        name: scene
        options:
          - off_light
          - min
          - half
          - full
          - warm
          - cold
        initial: full


    automation:

    - id: apply_scene
      alias: apply_scene
      initial_state: true
      trigger:
        - platform: state
          entity_id: input_select.scenes
      action:
        - service: scene.turn_on
          data_template:
            entity_id: scene.{{trigger.to_state.state}}
            transition: 2

    - id: switch_on_full_corridor_lamps
      alias: "switch_on_full_corridor_lamps"
      initial_state: true
      trigger:
        - platform: state
          entity_id: binary_sensor.kitchen_living_room_motion_sensor_occupancy
          to: "on"
        - platform: state
          entity_id: binary_sensor.entrance_door_contact
          to: "on"
      action:
          - service: scene.turn_on
            target:
              entity_id: scene.full

    - id: switch_off_corridor_lamps
      alias: "switch_off_corridor_lamps"
      initial_state: true
      trigger:
      - platform: state
        entity_id: alarm_control_panel.8124_a01_zone_1_alarm
        to:
          - 'armed_away'
          - 'armed_custom_bypass'
      - platform: state
        entity_id: binary_sensor.kitchen_living_room_motion_sensor_occupancy
        to: "off"
        for:
          minutes: 5
      condition:
      - "{{ states('input_text.prev_alarm_state') != 'unavailable' }}"
      - condition: or # Lamp_1 or lamp_2 is on
        conditions:
        - condition: state
          entity_id: light.corridor_lamp_1
          state: "on"
        - condition: state
          entity_id: light.corridor_lamp_2
          state: "on"
      action:
        - service: scene.turn_on
          target:
            entity_id: scene.off_light
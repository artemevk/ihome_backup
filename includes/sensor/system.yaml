  - platform: time_date
    display_options:
      - 'time'
      - 'date'
      - 'time_date'

  - platform: systemmonitor
    resources:
    - type: processor_use
    - type: disk_use_percent
      arg: /
    - type: memory_use_percent
    - type: last_boot
    - type: disk_free
      arg: /
      
  - platform: sql
    db_url: !secret db_link
    queries:
      - name: maria_db
        query: 'SELECT table_schema "database", Round(Sum(data_length + index_length) / 1048576, 2) "value" FROM information_schema.tables WHERE table_schema="homeassistant" GROUP BY table_schema;'
        column: 'value'
        unit_of_measurement: MB

# Время с последней перезагрузки
  - platform: template
    sensors:
      last_boot_custom:
        friendly_name: "Последняя перезагрузка"
        entity_id:
          - sensor.time
        value_template: >
           {% set uptime = as_timestamp (now()) -as_timestamp(states.sensor.last_boot.state) | int %}
           {% set minutes = (( uptime % 3600) / 60) | int %}
           {% set hours = ((uptime % 86400) / 3600) | int %}
           {% set days = (uptime / 86400) | int %}
             {% if uptime < 1 %}
               Меньше минуты
             {% else %}
               {% if days > 0 %}
                 {{ days }} д.
               {% endif %}
               {% if hours > 0 %}
                 {% if days > 0 %}
                   {{ ' ' }}
                 {% endif %}
                 {{ hours }} ч.
               {% endif %}
               {% if minutes > 0 %}
                 {% if days > 0 or hours > 0 %}
                   {{ ' ' }}
                 {% endif %}
                   {{ minutes }} мин.
               {% endif %}
             {% endif %}
        icon_template: mdi:clock

# Это приведет к неисправностям в версии 2022.12.0. Пожалуйста, устраните эту проблему перед обновлением.
#   - platform: uptime
#     name: online

  - platform: template
    sensors:
      online_custom:
         friendly_name: "HA онлайн"
         value_template: >
          {% set uptime = (as_timestamp(now()) - as_timestamp(states.sensor.online.state)) / 60 | int %}
          {% set minutes = (( uptime % 60) / 1) | int %}
          {% set hours = ((uptime % 1440) / 60) | int %}
          {% set days = (uptime / 1440) | int %}
             {% if uptime < 1 %}
              Меньше минуты
             {% else %}
              {% if days > 0 %}
                 {{ days }} д.
              {% endif %}
              {% if hours > 0 %}
                 {% if days > 0 %}
                  {{ ' ' }}
                 {% endif %}
                 {{ hours }} ч.
              {% endif %}
              {% if minutes > 0 %}
                 {% if days > 0 or hours > 0 %}
                  {{ ' ' }}
                 {% endif %}
                  {{ minutes }} мин.
              {% endif %}
             {% endif %}

title: Главная
icon: mdi:home-assistant
visible:
  - user: 2376d6369bca4360a25daab33042a011
cards:

  - type: vertical-stack
    cards:
    
    - type: markdown
      content: >
         **Текущее состояние**
         
    - type: entities
      show_header_toggle: false
      entities:
        - entity: sensor.last_boot_custom
        - entity: sensor.online_custom
        - entity: sensor.time
          name: Текущее время
          icon: mdi:clock-outline
        - entity: sensor.cpu_temperature
        - entity: sensor.date
          name: Дата
          icon: mdi:calendar-check-outline
        - entity: binary_sensor.rpi_power_status
          
          
    # - type: markdown
    #   content: >
    #      **Ping**
          
    - type: history-graph
      title: Ping
      hours_to_show: 2
      entities:
        - entity: binary_sensor.google_is_available
          name: google
        - entity: binary_sensor.yandex_is_available
          name: yandex
        - entity: sensor.internet_is_available
          name: internet
        - entity: binary_sensor.iflat_connection
          name: iFlat
          
    - type: markdown
      content: >
         **Резервное копирование**
         
    - type: entities
      show_header_toggle: false
      entities:
        - entity: sensor.last_google_backup_train
        - entity: sensor.snapshots_in_google_drive_train
        - entity: sensor.snapshots_in_hassio_train
          
    - type: entities
      show_header_toggle: false
      entities:
        - entity: sensor.maria_db
          name: Объем БД
          icon: mdi:database

  - type: vertical-stack
    cards:
    - type: markdown
      content: >
         **Графики** 
    - type: horizontal-stack
      cards:

       - type: gauge
         name: Загрузка CPU
         unit: '%'
         entity: sensor.processor_use_percent
         severity:
            green: 0
            yellow: 60
            red: 85
         
       - type: gauge
         name: Загрузка ОЗУ
         unit: '%'
         entity: sensor.memory_use_percent
         severity:
            green: 0
            yellow: 60
            red: 85
            
    - type: horizontal-stack
      cards:

       - type: gauge
         name: Диск заполнен
         unit: '%'
         entity: sensor.disk_use_percent
         severity:
            green: 0
            yellow: 60
            red: 85    
            
       - type: gauge
         name: Свободное место
         unit: 'Гб'
         entity: sensor.disk_free
         severity:
            red: 2
            yellow: 6
            green: 8
            
    - type: history-graph
      entities:
       - entity: sensor.maria_db
         name: Maria DB

  - type: vertical-stack
    cards:
      - type: entities
        entities:
        - entity: sensor.min_batteries_state
          secondary_info: last-updated
          name: Общий минимальный уровень
        - entity: sensor.entrance_door_battery
          secondary_info: last-updated
          name: Датчик открытия входной двери
        - entity: sensor.kitchen_living_room_motion_sensor_battery
          secondary_info: last-updated
          name: Датчик движения в гостиной
        - entity: sensor.outdoor_climate_battery
          secondary_info: last-updated
          name: Датчик климата на улице
        - entity: sensor.porch_motion_protect_battery
          secondary_info: last-updated
          name: Датчик движения на крыльце
        - entity: sensor.toilet_climate_battery
          secondary_info: last-updated
          name: Датчик климата в таулете
        title: Батарейки
        state_color: false
        show_header_toggle: false
